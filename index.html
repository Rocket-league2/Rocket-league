<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket League 2D</title>
<style>
/* ── Google Fonts (loads from CDN, works on GitHub Pages) ── */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:   #00b4ff;
  --orange: #ff6a00;
  --bg:     #0a0a12;
  --panel:  #10101e;
  --accent: #ffe000;
  --white:  #f0f4ff;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Exo 2', 'Segoe UI', sans-serif;
  color: var(--white);
  user-select: none;
}

#ui-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* ── Scoreboard ── */
#scoreboard {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--panel);
  border: 1px solid #1e1e36;
  border-radius: 8px;
  padding: 8px 24px;
  box-shadow: 0 0 30px #00b4ff18;
}

.team-score {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
}
.team-score.blue   { color: var(--blue); }
.team-score.orange { color: var(--orange); }

.team-label {
  font-size: 0.72rem;
  letter-spacing: 3px;
  opacity: 0.65;
  font-weight: 700;
}

#timer {
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--accent);
  min-width: 90px;
  text-align: center;
}

/* ── Canvas ── */
#gameCanvas {
  display: block;
  border-radius: 6px;
  border: 2px solid #1e1e36;
  box-shadow: 0 0 60px #00b4ff14, 0 0 120px #00b4ff08;
  cursor: none;
}

/* ── HUD ── */
#hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 4px;
}

.boost-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 180px;
}
.boost-label {
  font-size: 0.62rem;
  letter-spacing: 3px;
  opacity: 0.55;
  font-weight: 700;
}
.boost-bar-bg {
  height: 10px;
  background: #1a1a2e;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid #2a2a4a;
}
#boost-bar {
  height: 100%;
  background: linear-gradient(90deg, #ffe000, #ff8800);
  border-radius: 5px;
  width: 100%;
  transition: width 0.04s linear;
  box-shadow: 0 0 8px #ffe00066;
}

.controls-hint {
  font-size: 0.62rem;
  color: #4a4a7a;
  text-align: right;
  line-height: 1.9;
  letter-spacing: 0.5px;
}
kbd {
  display: inline-block;
  background: #1a1a2e;
  border: 1px solid #3a3a6a;
  border-radius: 3px;
  padding: 0 5px;
  color: var(--white);
  font-size: 0.6rem;
  font-family: inherit;
}

/* ── Overlay ── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,5,15,0.90);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  backdrop-filter: blur(6px);
  z-index: 100;
}
#overlay h1 {
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 700;
  letter-spacing: 6px;
  background: linear-gradient(90deg, var(--blue), var(--accent), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#overlay p {
  font-size: 0.95rem;
  opacity: 0.55;
  letter-spacing: 1.5px;
  max-width: 420px;
  text-align: center;
  line-height: 1.8;
}
#result-line {
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 4px;
  display: none;
}
.btn {
  margin-top: 8px;
  padding: 13px 46px;
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: transparent;
  border: 2px solid var(--accent);
  color: var(--accent);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.18s, color 0.18s, box-shadow 0.18s;
}
.btn:hover {
  background: var(--accent);
  color: #0a0a12;
  box-shadow: 0 0 28px #ffe00055;
}

/* ── Goal flash ── */
#goal-flash {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 50;
  opacity: 0; transition: opacity 0.15s;
}
#goal-text {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.4);
  font-family: 'Rajdhani', 'Segoe UI', sans-serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 700;
  letter-spacing: 8px;
  pointer-events: none; z-index: 60;
  opacity: 0;
  transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  text-shadow: 0 0 40px currentColor;
}
</style>
</head>
<body>

<div id="overlay">
  <h1>ROCKET LEAGUE 2D</h1>
  <p id="overlay-msg">Drive your car into the ball and score in the opponent's goal.<br>Collect yellow pads for boost. Most goals in 5 minutes wins!</p>
  <div id="result-line"></div>
  <button class="btn" id="start-btn">KICK OFF</button>
</div>

<div id="goal-flash"></div>
<div id="goal-text">GOAL!</div>

<div id="ui-wrapper">
  <!-- Scoreboard (width set by JS) -->
  <div id="scoreboard">
    <div class="team-score blue">
      <div>
        <div class="team-label">BLUE</div>
        <div id="score-blue">0</div>
      </div>
    </div>
    <div id="timer">5:00</div>
    <div class="team-score orange">
      <div style="text-align:right">
        <div class="team-label">ORANGE</div>
        <div id="score-orange">0</div>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="boost-wrap">
      <div class="boost-label">⚡ BOOST</div>
      <div class="boost-bar-bg"><div id="boost-bar"></div></div>
    </div>
    <div class="controls-hint">
      <kbd>A</kbd><kbd>D</kbd> Drive &nbsp;
      <kbd>Space</kbd> Jump / Double-Jump &nbsp;
      <kbd>Shift</kbd> Boost<br>
      <kbd>W</kbd> also boosts &nbsp;|&nbsp; <kbd>R</kbd> Reset ball &amp; cars
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//   ROCKET LEAGUE 2D  –  Game Engine
//   Single-file, zero-dependency, GitHub Pages ready
// ═══════════════════════════════════════════════

// ── Responsive canvas sizing ─────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H, scaleFactor;

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth  - 20, 960);
  const maxH = Math.min(window.innerHeight - 140, 560);
  const ratio = 960 / 560;
  if (maxW / ratio <= maxH) { W = maxW; H = Math.round(maxW / ratio); }
  else                       { H = maxH; W = Math.round(maxH * ratio); }
  scaleFactor = W / 960;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const sb = document.getElementById('scoreboard');
  sb.style.width = W + 'px';
  const hud = document.getElementById('hud');
  hud.style.width = W + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); recalcLayout(); });

// ── Scaled constants ──────────────────────────
// All "design" coords are in 960×560 space, then scaled
const DS = { W: 960, H: 560 };
function s(v) { return v * scaleFactor; }  // scale value

// Layout derived from canvas size (recalculated on resize)
let GROUND, CEILING, WALL_L, WALL_R, GOAL_W, GOAL_H, GOAL_L_rect, GOAL_R_rect;
let BALL_R, CAR_W, CAR_H;

function recalcLayout() {
  GROUND  = H - s(60);
  CEILING = s(60);
  WALL_L  = s(30);
  WALL_R  = W - s(30);
  GOAL_W  = s(110);
  GOAL_H  = s(130);
  GOAL_L_rect = { x: WALL_L,          y: GROUND - GOAL_H, w: GOAL_W, h: GOAL_H };
  GOAL_R_rect = { x: WALL_R - GOAL_W, y: GROUND - GOAL_H, w: GOAL_W, h: GOAL_H };
  BALL_R = s(28);
  CAR_W  = s(52);
  CAR_H  = s(30);
  // Reposition boost pads
  BOOST_PADS[0].x = W/2;  BOOST_PADS[0].y = GROUND - s(8); BOOST_PADS[0].r = s(18);
  BOOST_PADS[1].x = s(180); BOOST_PADS[1].y = GROUND - s(8); BOOST_PADS[1].r = s(14);
  BOOST_PADS[2].x = W-s(180); BOOST_PADS[2].y = GROUND - s(8); BOOST_PADS[2].r = s(14);
  BOOST_PADS[3].x = W/2;  BOOST_PADS[3].y = H*0.45; BOOST_PADS[3].r = s(14);
}

// ── Physics constants (scale-independent multipliers) ──
const GRAVITY     = 0.55;
const FRICTION    = 0.018;
const AIR_DRAG    = 0.003;
const BALL_BOUNCE = 0.62;
const CAR_BOUNCE  = 0.42;
const BOOST_MAX   = 100;
const BOOST_DRAIN = 0.65;
const BOOST_REGEN = 0.10;
const BOOST_FORCE_MULT = 0.95;
const DRIVE_MULT  = 0.58;
const JUMP_VY_MULT = -14;
const MAX_SPD     = 14;
const MATCH_SEC   = 300;

// ── Boost pads (x/y/r set in recalcLayout) ───
const BOOST_PADS = [
  { x:0, y:0, r:0, large:true,  cooldown:0 },
  { x:0, y:0, r:0, large:false, cooldown:0 },
  { x:0, y:0, r:0, large:false, cooldown:0 },
  { x:0, y:0, r:0, large:false, cooldown:0 },
];
recalcLayout();

// ── State ─────────────────────────────────────
let scoreBlue = 0, scoreOrange = 0;
let timeLeft  = MATCH_SEC;
let gameRunning = false;
let lastTs = 0;
let keys = {};
let goalCooldown = 0;
let timerAccum   = 0;

// ── Ball ──────────────────────────────────────
let ball;
function resetBall() {
  ball = {
    x: W/2,
    y: GROUND - BALL_R - s(10),
    vx: (Math.random() - 0.5) * 4,
    vy: -3,
    spin: 0
  };
}

// ── Cars ──────────────────────────────────────
function makeCar(x, dir, isPlayer, color) {
  return {
    x, y: GROUND - CAR_H / 2,
    vx: 0, vy: 0,
    angle: 0,
    onGround: true,
    jumpCount: 0,
    jumpHeld: false,
    boost: BOOST_MAX,
    dir,            // facing: 1 = right, -1 = left
    isPlayer,
    color,
  };
}

let player, cpu;
function resetCars() {
  player = makeCar(W * 0.25,  1, true,  '#00b4ff');
  cpu    = makeCar(W * 0.75, -1, false, '#ff6a00');
}

// ── Input ─────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR' && gameRunning) { resetCars(); resetBall(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Math helpers ─────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dist2  = (a, b) => (a.x-b.x)**2 + (a.y-b.y)**2;
const dist_  = (a, b) => Math.sqrt(dist2(a, b));
const sign_  = v => v === 0 ? 0 : v > 0 ? 1 : -1;

// Circle vs AABB: returns { hit, nx, ny } (nx/ny = vector from rect to circle)
function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const nx = cx - clamp(cx, rx, rx + rw);
  const ny = cy - clamp(cy, ry, ry + rh);
  return { hit: nx*nx + ny*ny < r*r, nx, ny };
}

// ── Step car ─────────────────────────────────
function stepCar(c) {
  let drive = 0, wantJump = false, wantBoost = false;

  if (c.isPlayer) {
    if (keys['KeyA'] || keys['ArrowLeft'])  drive = -1;
    if (keys['KeyD'] || keys['ArrowRight']) drive =  1;
    wantJump  = !!(keys['Space']);
    wantBoost = !!(keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyW'] || keys['ArrowUp']);
  } else {
    const ai = cpuAI(c);
    drive = ai.drive; wantJump = ai.jump; wantBoost = ai.boost;
  }

  // Drive
  if (c.onGround) {
    c.vx += drive * DRIVE_MULT;
    c.vx *= (1 - FRICTION);
  } else {
    c.vx += drive * DRIVE_MULT * 0.35;
  }
  c.vx = clamp(c.vx, -MAX_SPD, MAX_SPD);

  // Boost
  if (wantBoost && c.boost > 0) {
    const bdir = drive !== 0 ? sign_(c.vx || drive) : c.dir;
    c.vx += bdir * BOOST_FORCE_MULT;
    c.vx  = clamp(c.vx, -MAX_SPD * 1.65, MAX_SPD * 1.65);
    if (!c.onGround) c.vy -= BOOST_FORCE_MULT * 0.45;
    c.boost = Math.max(0, c.boost - BOOST_DRAIN);
  } else {
    c.boost = Math.min(BOOST_MAX, c.boost + BOOST_REGEN);
  }

  if (drive !== 0) c.dir = drive;

  // Jump
  if (wantJump && !c.jumpHeld) {
    if (c.onGround) {
      c.vy = JUMP_VY_MULT * scaleFactor;
      c.onGround = false;
      c.jumpCount = 1;
    } else if (c.jumpCount === 1) {
      c.vy = JUMP_VY_MULT * scaleFactor * 0.85;
      c.vx += c.dir * s(4);
      c.jumpCount = 2;
    }
    c.jumpHeld = true;
  }
  if (!wantJump) c.jumpHeld = false;

  // Gravity & drag
  c.vy += GRAVITY * scaleFactor;
  if (!c.onGround) {
    c.vx *= (1 - AIR_DRAG);
    c.vy *= (1 - AIR_DRAG * 0.5);
  }

  // Air rotation
  if (!c.onGround) c.angle += c.vx * 0.012;
  else             c.angle *= 0.65;

  c.x += c.vx;
  c.y += c.vy;

  // Ground
  const groundY = GROUND - CAR_H / 2;
  if (c.y >= groundY) {
    c.y = groundY; c.vy *= -CAR_BOUNCE;
    if (Math.abs(c.vy) < s(1)) c.vy = 0;
    c.onGround = true; c.jumpCount = 0;
    c.angle *= 0.45;
  } else { c.onGround = false; }

  // Ceiling
  if (c.y <= CEILING + CAR_H / 2) {
    c.y = CEILING + CAR_H / 2;
    c.vy = Math.abs(c.vy) * 0.3;
  }

  // Walls
  const carBottom = c.y + CAR_H / 2;
  if (c.x - CAR_W / 2 < WALL_L) {
    if (carBottom < GOAL_L_rect.y) { c.x = WALL_L + CAR_W/2; c.vx = Math.abs(c.vx) * 0.5; }
    else c.x = Math.max(c.x, WALL_L + CAR_W / 2);
  }
  if (c.x + CAR_W / 2 > WALL_R) {
    if (carBottom < GOAL_R_rect.y) { c.x = WALL_R - CAR_W/2; c.vx = -Math.abs(c.vx) * 0.5; }
    else c.x = Math.min(c.x, WALL_R - CAR_W / 2);
  }
}

// ── Step ball ────────────────────────────────
function stepBall() {
  ball.vy += GRAVITY * 0.88 * scaleFactor;
  ball.vx *= (1 - AIR_DRAG * 0.45);
  ball.vy *= (1 - AIR_DRAG * 0.25);
  ball.x  += ball.vx;
  ball.y  += ball.vy;
  ball.spin += (ball.vx * 0.025 - ball.spin) * 0.12;

  // Ground
  if (ball.y + BALL_R >= GROUND) {
    ball.y = GROUND - BALL_R;
    ball.vy *= -BALL_BOUNCE;
    ball.vx *= (1 - FRICTION * 1.6);
    if (Math.abs(ball.vy) < s(0.5)) ball.vy = 0;
  }
  // Ceiling
  if (ball.y - BALL_R <= CEILING) {
    ball.y = CEILING + BALL_R;
    ball.vy = Math.abs(ball.vy) * BALL_BOUNCE;
  }
  // Left wall (allow goal area)
  if (ball.x - BALL_R <= WALL_L) {
    if (ball.y < GOAL_L_rect.y) { ball.x = WALL_L + BALL_R; ball.vx = Math.abs(ball.vx) * BALL_BOUNCE; }
  }
  // Right wall
  if (ball.x + BALL_R >= WALL_R) {
    if (ball.y < GOAL_R_rect.y) { ball.x = WALL_R - BALL_R; ball.vx = -Math.abs(ball.vx) * BALL_BOUNCE; }
  }
}

// ── Car-ball collision ───────────────────────
function carBallCollide(c) {
  const r = { x: c.x - CAR_W/2, y: c.y - CAR_H/2, w: CAR_W, h: CAR_H };
  const { hit, nx, ny } = circleRect(ball.x, ball.y, BALL_R, r.x, r.y, r.w, r.h);
  if (!hit) return;
  const len = Math.hypot(nx, ny) || 1;
  const ux = nx / len, uy = ny / len;
  const spd = s(10) + Math.hypot(c.vx, c.vy) * 0.85;
  ball.vx = ux * spd * 0.9 + c.vx * 0.55;
  ball.vy = uy * spd * 0.9 + c.vy * 0.55;
  // push apart
  ball.x = c.x + ux * (BALL_R + CAR_W / 2 + s(2));
  ball.y = c.y + uy * (BALL_R + CAR_H / 2 + s(2));
  c.vx -= ux * s(2); c.vy -= uy * s(2);
}

// ── Car-car collision ────────────────────────
function carCarCollide() {
  const dx = player.x - cpu.x, dy = player.y - cpu.y;
  const d  = Math.hypot(dx, dy);
  const minD = (CAR_W * 0.85);
  if (d < minD && d > 0.1) {
    const ux = dx/d, uy = dy/d;
    const sep = (minD - d) / 2 + s(1);
    player.x += ux*sep; player.y += uy*sep;
    cpu.x    -= ux*sep; cpu.y    -= uy*sep;
    const dot = (player.vx - cpu.vx)*ux + (player.vy - cpu.vy)*uy;
    if (dot > 0) {
      player.vx -= dot*ux*0.75; player.vy -= dot*uy*0.75;
      cpu.vx    += dot*ux*0.75; cpu.vy    += dot*uy*0.75;
    }
  }
}

// ── Boost pads ───────────────────────────────
function checkBoostPads(c) {
  BOOST_PADS.forEach(p => {
    if (p.cooldown > 0) { p.cooldown--; return; }
    if (dist_(c, p) < p.r + s(14)) {
      c.boost = Math.min(BOOST_MAX, c.boost + (p.large ? 100 : 28));
      p.cooldown = p.large ? 600 : 320;
    }
  });
}

// ── Goal detection ────────────────────────────
function checkGoal() {
  if (goalCooldown > 0) return;
  // Blue goal = right side
  if (ball.x + BALL_R > GOAL_R_rect.x && ball.y > GOAL_R_rect.y) { scoreBlue++;   triggerGoal('blue');   }
  // Orange goal = left side
  if (ball.x - BALL_R < GOAL_L_rect.x + GOAL_L_rect.w && ball.y > GOAL_L_rect.y) { scoreOrange++; triggerGoal('orange'); }
}

function triggerGoal(team) {
  goalCooldown = 210;
  const gt = document.getElementById('goal-text');
  const fl = document.getElementById('goal-flash');
  gt.style.color     = team === 'blue' ? '#00b4ff' : '#ff6a00';
  gt.style.opacity   = '1';
  gt.style.transform = 'translate(-50%,-50%) scale(1)';
  fl.style.background= team === 'blue' ? 'rgba(0,180,255,0.15)' : 'rgba(255,106,0,0.15)';
  fl.style.opacity   = '1';
  setTimeout(() => {
    gt.style.opacity   = '0';
    gt.style.transform = 'translate(-50%,-50%) scale(0.4)';
    fl.style.opacity   = '0';
    document.getElementById('score-blue').textContent   = scoreBlue;
    document.getElementById('score-orange').textContent = scoreOrange;
  }, 1800);
  setTimeout(() => {
    resetBall(); resetCars(); goalCooldown = 0;
  }, 2100);
}

// ── CPU AI ────────────────────────────────────
function cpuAI(c) {
  const bx = ball.x, by = ball.y;
  // CPU is orange, defends left goal (GOAL_L) and attacks right goal (GOAL_R)
  const targetX = bx - s(30);
  const dx = targetX - c.x;
  const dyBall = by - c.y;
  const d = dist_(c, ball);

  let drive = 0, jump = false, boost = false;

  drive = Math.abs(dx) > s(20) ? (dx > 0 ? 1 : -1) : 0;

  // Boost when far from ball or ball is airborne
  if (d > s(200) && c.boost > 25) boost = true;
  if (ball.vy < -s(4) && by < GROUND - s(80)) boost = true;

  // Jump toward aerial ball
  if (dyBall < -s(35) && d < s(190)) {
    if (c.onGround) jump = true;
    else if (c.jumpCount === 1 && by < c.y - s(55)) jump = true;
  }

  // Back off if ball deep in own half
  if (bx < W * 0.3 && c.x < W * 0.3) drive = -1;

  return { drive, jump, boost };
}

// ── Timer ─────────────────────────────────────
function updateTimer(dt) {
  if (!gameRunning) return;
  timerAccum += dt;
  if (timerAccum >= 1000) {
    timerAccum -= 1000;
    timeLeft = Math.max(0, timeLeft - 1);
    const m = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    document.getElementById('timer').textContent = `${m}:${sec.toString().padStart(2,'0')}`;
    if (timeLeft === 0) endGame();
  }
}

function endGame() {
  gameRunning = false;
  const rl  = document.getElementById('result-line');
  const msg = document.getElementById('overlay-msg');
  rl.style.display  = 'block';
  msg.style.display = 'none';
  if      (scoreBlue > scoreOrange) { rl.style.color = '#00b4ff'; rl.textContent = '🏆  BLUE WINS!'; }
  else if (scoreOrange > scoreBlue) { rl.style.color = '#ff6a00'; rl.textContent = '🏆  ORANGE WINS!'; }
  else                              { rl.style.color = '#ffe000'; rl.textContent = "🤝  IT'S A TIE!"; }
  document.getElementById('start-btn').textContent = 'PLAY AGAIN';
  document.getElementById('overlay').style.display = 'flex';
}

// ── Draw helpers ──────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y, x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h, x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h, x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y, x+r,y);
  ctx.closePath();
}

function shadeHex(hex, amt) {
  const n=parseInt(hex.replace('#',''),16);
  const r=clamp(((n>>16)&0xff)+amt,0,255);
  const g=clamp(((n>>8)&0xff)+amt,0,255);
  const b=clamp((n&0xff)+amt,0,255);
  return `rgb(${r},${g},${b})`;
}

// ── Render ────────────────────────────────────
function drawArena() {
  // Background
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#08081a'); sky.addColorStop(1,'#0f0f26');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Midfield line
  ctx.save();
  ctx.strokeStyle = '#1c1c38'; ctx.lineWidth = s(1.5);
  ctx.setLineDash([s(8), s(14)]);
  ctx.beginPath(); ctx.moveTo(W/2, CEILING); ctx.lineTo(W/2, GROUND); ctx.stroke();
  ctx.setLineDash([]);

  // Centre circle
  ctx.strokeStyle = '#1c1c38'; ctx.lineWidth = s(1.5);
  ctx.beginPath(); ctx.arc(W/2,(GROUND+CEILING)/2,s(70),0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Ground surface
  const gnd = ctx.createLinearGradient(0,GROUND-s(3),0,GROUND+s(32));
  gnd.addColorStop(0,'#1d1e52'); gnd.addColorStop(1,'#0a0a12');
  ctx.fillStyle=gnd;
  ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='#35357a'; ctx.lineWidth=s(2);
  ctx.beginPath(); ctx.moveTo(WALL_L,GROUND); ctx.lineTo(WALL_R,GROUND); ctx.stroke();

  // Side walls (decorative fill)
  ctx.fillStyle='#0c0c20';
  ctx.fillRect(0,CEILING,WALL_L,GROUND-CEILING);
  ctx.fillRect(WALL_R,CEILING,W-WALL_R,GROUND-CEILING);

  // Arena border
  ctx.strokeStyle='#28285a'; ctx.lineWidth=s(2);
  ctx.strokeRect(WALL_L,CEILING,WALL_R-WALL_L,GROUND-CEILING);

  // Ceiling bar
  ctx.fillStyle='#0c0c20';
  ctx.fillRect(0,0,W,CEILING);
  ctx.strokeStyle='#28285a'; ctx.lineWidth=s(1);
  ctx.beginPath(); ctx.moveTo(WALL_L,CEILING); ctx.lineTo(WALL_R,CEILING); ctx.stroke();

  // Goals
  const goals = [
    { rect: GOAL_L_rect, fill:'rgba(255,106,0,0.07)', stroke:'#ff6a00', label:'ORANGE' },
    { rect: GOAL_R_rect, fill:'rgba(0,180,255,0.07)',  stroke:'#00b4ff', label:'BLUE'   },
  ];
  goals.forEach(g => {
    ctx.fillStyle   = g.fill;
    ctx.strokeStyle = g.stroke;
    ctx.lineWidth   = s(2);
    ctx.fillRect(g.rect.x, g.rect.y, g.rect.w, g.rect.h);
    ctx.strokeRect(g.rect.x, g.rect.y, g.rect.w, g.rect.h);
    ctx.fillStyle = g.stroke;
    ctx.globalAlpha = 0.45;
    ctx.font = `bold ${s(10)}px 'Exo 2', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(g.label, g.rect.x + g.rect.w/2, g.rect.y + s(18));
    ctx.globalAlpha = 1;
  });
}

function drawBoostPads() {
  BOOST_PADS.forEach(p => {
    const alpha = p.cooldown > 0 ? 0.18 : 0.9;
    ctx.globalAlpha = alpha;
    const gr = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    gr.addColorStop(0,'#ffe000');
    gr.addColorStop(0.6,'rgba(255,180,0,0.6)');
    gr.addColorStop(1,'rgba(255,140,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawCar(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.angle);

  // Ground shadow (unrotated)
  ctx.save();
  ctx.rotate(-c.angle);
  ctx.globalAlpha = 0.28;
  ctx.fillStyle   = '#000';
  ctx.beginPath(); ctx.ellipse(0, CAR_H/2+s(2), CAR_W/2, s(5), 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Body gradient
  const bg = ctx.createLinearGradient(-CAR_W/2,-CAR_H/2, CAR_W/2,CAR_H/2);
  bg.addColorStop(0, c.color);
  bg.addColorStop(1, shadeHex(c.color,-45));
  ctx.fillStyle = bg;
  ctx.beginPath(); roundRect(ctx, -CAR_W/2,-CAR_H/2, CAR_W,CAR_H, s(7)); ctx.fill();

  // Top edge highlight
  ctx.strokeStyle = c.color+'99';
  ctx.lineWidth = s(1.5);
  ctx.beginPath(); roundRect(ctx, -CAR_W/2,-CAR_H/2, CAR_W,CAR_H, s(7)); ctx.stroke();

  // Windshield
  const wd = c.dir;
  ctx.fillStyle = 'rgba(160,230,255,0.22)';
  ctx.beginPath();
  ctx.moveTo(wd*s(4), -CAR_H/2+s(2));
  ctx.lineTo(wd*(CAR_W/2-s(4)), -CAR_H/2+s(2));
  ctx.lineTo(wd*(CAR_W/2-s(2)), -CAR_H/2+CAR_H*0.46);
  ctx.lineTo(wd*s(4), -CAR_H/2+CAR_H*0.46);
  ctx.closePath(); ctx.fill();

  // Headlight glow
  const hx = wd*(CAR_W/2-s(5));
  ctx.shadowColor = '#fffbe0'; ctx.shadowBlur = s(12);
  ctx.fillStyle   = '#fffbe0';
  ctx.fillRect(hx-wd*s(3), -CAR_H/2+s(5), wd*s(5), s(4));
  ctx.shadowBlur = 0;

  // Wheels
  const wR = s(9);
  [[-CAR_W/2+s(9), CAR_H/2-s(2)],[CAR_W/2-s(9), CAR_H/2-s(2)]].forEach(([wx,wy]) => {
    ctx.fillStyle='#1e1e3e'; ctx.beginPath(); ctx.arc(wx,wy,wR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a3a5e'; ctx.beginPath(); ctx.arc(wx,wy,wR-s(3),0,Math.PI*2); ctx.fill();
  });

  // Boost flame
  if (!c.onGround && c.boost < BOOST_MAX) {
    ctx.save();
    ctx.translate(-wd*CAR_W/2, 0);
    const fl = s(18) + Math.random()*s(10);
    const fg = ctx.createLinearGradient(0,0,-wd*fl,0);
    fg.addColorStop(0,'#ffe000'); fg.addColorStop(0.5,'#ff5500'); fg.addColorStop(1,'rgba(255,40,0,0)');
    ctx.fillStyle = fg; ctx.globalAlpha = 0.82;
    ctx.beginPath();
    ctx.moveTo(0,-s(5)); ctx.lineTo(-wd*fl,0); ctx.lineTo(0,s(5));
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function drawBall() {
  ctx.save();
  ctx.translate(ball.x, ball.y);

  // Drop shadow
  const sh = GROUND - ball.y;
  if (sh > 0) {
    const sa = Math.max(0, 1 - sh/s(300)) * 0.32;
    ctx.save();
    ctx.translate(0, sh - BALL_R + s(8));
    ctx.scale(1 + sh/s(400), 0.28);
    ctx.fillStyle = `rgba(0,0,0,${sa})`;
    ctx.beginPath(); ctx.arc(0,0,BALL_R*0.8,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Glow
  ctx.shadowColor = '#aaccff'; ctx.shadowBlur = s(16);
  // Body
  const bg = ctx.createRadialGradient(-BALL_R*0.25,-BALL_R*0.25,BALL_R*0.06, 0,0,BALL_R);
  bg.addColorStop(0,'#dde8ff'); bg.addColorStop(0.45,'#9aaedd'); bg.addColorStop(1,'#334');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,BALL_R,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Seams
  ctx.rotate(ball.spin);
  ctx.strokeStyle='rgba(0,0,40,0.35)'; ctx.lineWidth=s(1.5);
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.arc(0,0,BALL_R, i*Math.PI*2/3, i*Math.PI*2/3+Math.PI);
    ctx.stroke();
  }

  ctx.restore();
}

// ── HUD ───────────────────────────────────────
function drawHUD() {
  document.getElementById('boost-bar').style.width = (player.boost / BOOST_MAX * 100) + '%';
}

// ── Game loop ────────────────────────────────
function gameLoop(ts) {
  const dt = ts - lastTs;
  lastTs = ts;

  if (gameRunning && goalCooldown === 0) {
    stepCar(player);
    stepCar(cpu);
    stepBall();
    carBallCollide(player);
    carBallCollide(cpu);
    carCarCollide();
    checkBoostPads(player);
    checkBoostPads(cpu);
    checkGoal();
    updateTimer(dt);
  } else if (goalCooldown > 0) {
    goalCooldown--;
  }

  ctx.clearRect(0,0,W,H);
  drawArena();
  drawBoostPads();
  drawCar(player);
  drawCar(cpu);
  drawBall();
  drawHUD();

  requestAnimationFrame(gameLoop);
}

// ── Start button ─────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  scoreBlue = 0; scoreOrange = 0;
  timeLeft  = MATCH_SEC; timerAccum = 0;
  document.getElementById('score-blue').textContent   = '0';
  document.getElementById('score-orange').textContent = '0';
  document.getElementById('timer').textContent = '5:00';
  document.getElementById('result-line').style.display = 'none';
  document.getElementById('overlay-msg').style.display = 'block';
  document.getElementById('overlay').style.display = 'none';
  BOOST_PADS.forEach(p => p.cooldown = 0);
  resetBall(); resetCars();
  gameRunning = true;
});

requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(gameLoop); });
</script>
