<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rocket League 2D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Exo+2:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a12;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: 'Exo 2', Arial, sans-serif;
  color: #f0f4ff;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px;
}

#scoreboard {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 900px;
  background: #10101e;
  border: 1px solid #1e1e36;
  border-radius: 8px;
  padding: 6px 20px;
  flex-shrink: 0;
}
.tscore { font-family: 'Rajdhani', Arial, sans-serif; font-size: 2rem; font-weight: 700; }
.tscore.blue   { color: #00b4ff; }
.tscore.orange { color: #ff6a00; }
.tlabel { font-size: 0.65rem; letter-spacing: 3px; opacity: 0.6; font-weight: 700; }
#timer { font-family: 'Rajdhani', Arial, sans-serif; font-size: 1.9rem; font-weight: 700; color: #ffe000; letter-spacing: 3px; }

#canvas-wrap { width: 100%; max-width: 900px; line-height: 0; }
#gameCanvas  { display: block; width: 100%; height: auto; border-radius: 6px; border: 2px solid #1e1e36; }

#hud {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; max-width: 900px; padding: 0 2px;
}
.boost-wrap { display: flex; flex-direction: column; gap: 3px; width: 160px; }
.blabel { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5; font-weight: 700; }
.btrack { height: 9px; background: #1a1a2e; border-radius: 5px; overflow: hidden; border: 1px solid #2a2a4a; }
#boost-fill { height: 100%; width: 100%; background: linear-gradient(90deg,#ffe000,#ff8800); border-radius: 5px; transition: width 0.05s; }
.hint { font-size: 0.58rem; color: #3a3a6a; text-align: right; line-height: 1.8; }
kbd { background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 3px; padding: 0 4px; color: #f0f4ff; font-size: 0.56rem; font-family: inherit; }

#overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,5,15,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
#overlay h1 {
  font-family: 'Rajdhani', Arial, sans-serif;
  font-size: clamp(1.8rem, 6vw, 4rem); font-weight: 700; letter-spacing: 6px;
  background: linear-gradient(90deg,#00b4ff,#ffe000,#ff6a00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#overlay p { font-size: 0.9rem; opacity: 0.5; text-align: center; line-height: 1.8; max-width: 380px; padding: 0 16px; }
#result-msg { font-family: 'Rajdhani', Arial, sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: 4px; display: none; }
.btn {
  padding: 12px 44px; font-family: 'Rajdhani', Arial, sans-serif;
  font-size: 1.1rem; font-weight: 700; letter-spacing: 4px;
  background: transparent; border: 2px solid #ffe000; color: #ffe000;
  border-radius: 4px; cursor: pointer; transition: background .15s, color .15s;
}
.btn:hover, .btn:active { background: #ffe000; color: #0a0a12; }

#gflash { position: fixed; inset: 0; opacity: 0; pointer-events: none; z-index: 50; transition: opacity .15s; }
#gtext {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.3);
  font-family: 'Rajdhani', Arial, sans-serif;
  font-size: clamp(3rem, 10vw, 6rem); font-weight: 700; letter-spacing: 8px;
  pointer-events: none; z-index: 60; opacity: 0;
  transition: opacity .2s, transform .25s cubic-bezier(.34,1.56,.64,1);
  text-shadow: 0 0 40px currentColor;
}
</style>
</head>
<body>

<div id="overlay">
  <h1>ROCKET LEAGUE 2D</h1>
  <p id="intro-p">Drive into the ball and score in the opponent's net.<br>Blue attacks right ▶ &nbsp;|&nbsp; Orange attacks left ◀</p>
  <div id="result-msg"></div>
  <button class="btn" id="startBtn">KICK OFF</button>
</div>

<div id="gflash"></div>
<div id="gtext">GOAL!</div>

<div id="scoreboard">
  <div class="tscore blue"><div class="tlabel">BLUE</div><div id="sBlue">0</div></div>
  <div id="timer">5:00</div>
  <div class="tscore orange" style="text-align:right"><div class="tlabel">ORANGE</div><div id="sOrange">0</div></div>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="hud">
  <div class="boost-wrap">
    <div class="blabel">⚡ BOOST</div>
    <div class="btrack"><div id="boost-fill"></div></div>
  </div>
  <div class="hint">
    <kbd>A</kbd><kbd>D</kbd> Drive &nbsp;
    <kbd>Space</kbd> Jump (x2 = dodge) &nbsp;
    <kbd>Shift</kbd> Boost<br>
    <kbd>W</kbd> / <kbd>↑</kbd> also boost &nbsp;|&nbsp; <kbd>R</kbd> Reset
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ROCKET LEAGUE 2D  —  Fixed 900×520 internal canvas,
//  CSS scales to fit any screen. No dynamic-scale bugs.
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Fixed internal resolution — CSS width:100% handles visual scaling
const GW = 900, GH = 520;
canvas.width  = GW;
canvas.height = GH;

// ── Arena (fixed coords) ───────────────────────────────
const GROUND  = GH - 55;
const CEILING = 55;
const WALL_L  = 28;
const WALL_R  = GW - 28;
const GOAL_W  = 105;
const GOAL_H  = 125;
// Left goal  → orange defends, blue attacks
// Right goal → blue defends, orange attacks
const GL = { x: WALL_L,            y: GROUND - GOAL_H, w: GOAL_W, h: GOAL_H };
const GR = { x: WALL_R - GOAL_W,   y: GROUND - GOAL_H, w: GOAL_W, h: GOAL_H };

// Boost pads
const PADS = [
  { x: GW/2,    y: GROUND-8,   r: 18, large: true,  cd: 0 },
  { x: 175,     y: GROUND-8,   r: 14, large: false, cd: 0 },
  { x: GW-175,  y: GROUND-8,   r: 14, large: false, cd: 0 },
  { x: GW/2,    y: GH*0.42,    r: 14, large: false, cd: 0 },
];

// ── Physics constants ──────────────────────────────────
const GRAV        = 0.52;
const FRICTION    = 0.017;
const AIR_DRAG    = 0.003;
const BALL_R      = 26;
const CAR_W       = 50;
const CAR_H       = 28;
const BALL_BNC    = 0.63;
const CAR_BNC     = 0.40;
const BOOST_MAX   = 100;
const BOOST_DRAIN = 0.60;
const BOOST_REGEN = 0.09;
const DRIVE_F     = 0.55;
const BOOST_F     = 0.88;
const JUMP_SPD    = 13.5;
const MAX_SPD     = 13.5;
const MATCH_TIME  = 300;

// ── State ──────────────────────────────────────────────
let ball, player, cpu;
let scoreBlue = 0, scoreOrange = 0;
let timeLeft  = MATCH_TIME;
let timerAcc  = 0;
let running   = false;
let goalCD    = 0;
let keys      = {};
let lastT     = 0;

// ── Helpers ────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const vlen  = (x, y)      => Math.sqrt(x*x + y*y);
const sign  = v            => v < 0 ? -1 : v > 0 ? 1 : 0;

function circleVsRect(cx, cy, r, rx, ry, rw, rh) {
  // nearest point on rect to circle center
  const nearX = clamp(cx, rx, rx+rw);
  const nearY = clamp(cy, ry, ry+rh);
  // vector FROM nearest rect point TO circle center (outward normal)
  const nx = cx - nearX;
  const ny = cy - nearY;
  return { hit: nx*nx+ny*ny < r*r, nx, ny };
}

// ── Spawn ──────────────────────────────────────────────
function spawnBall() {
  ball = { x: GW/2, y: GROUND-BALL_R-8, vx: (Math.random()-.5)*3, vy: -2, spin: 0 };
}
function spawnCar(x, dir, isPlayer, color) {
  return { x, y: GROUND-CAR_H/2-1, vx:0, vy:0, angle:0, onGround:true,
           jumpCount:0, jumpHeld:false, boost:BOOST_MAX, dir, isPlayer, color };
}
function spawnAll() {
  spawnBall();
  player = spawnCar(GW*0.25,  1, true,  '#00b4ff');
  cpu    = spawnCar(GW*0.75, -1, false, '#ff6a00');
}

// ── Input ──────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR' && running) spawnAll();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Car step ───────────────────────────────────────────
function stepCar(c) {
  let drive=0, jump=false, boost=false;

  if (c.isPlayer) {
    if (keys['KeyA']||keys['ArrowLeft'])  drive=-1;
    if (keys['KeyD']||keys['ArrowRight']) drive= 1;
    jump  = !!(keys['Space']);
    boost = !!(keys['ShiftLeft']||keys['ShiftRight']||keys['KeyW']||keys['ArrowUp']);
  } else {
    const a=cpuBrain(c); drive=a.drive; jump=a.jump; boost=a.boost;
  }

  // Drive
  c.vx += drive * (c.onGround ? DRIVE_F : DRIVE_F*0.3);
  if (c.onGround) c.vx *= (1-FRICTION);
  c.vx = clamp(c.vx, -MAX_SPD, MAX_SPD);

  // Boost
  if (boost && c.boost > 0) {
    const bd = drive!==0 ? sign(c.vx||drive) : c.dir;
    c.vx += bd * BOOST_F;
    c.vx  = clamp(c.vx, -MAX_SPD*1.6, MAX_SPD*1.6);
    if (!c.onGround) c.vy -= BOOST_F*0.42;
    c.boost = Math.max(0, c.boost-BOOST_DRAIN);
  } else {
    c.boost = Math.min(BOOST_MAX, c.boost+BOOST_REGEN);
  }
  if (drive!==0) c.dir=drive;

  // Jump
  if (jump && !c.jumpHeld) {
    if (c.onGround)         { c.vy=-JUMP_SPD; c.onGround=false; c.jumpCount=1; }
    else if(c.jumpCount===1){ c.vy=-JUMP_SPD*0.82; c.vx+=c.dir*4; c.jumpCount=2; }
    c.jumpHeld=true;
  }
  if (!jump) c.jumpHeld=false;

  // Gravity & drag
  c.vy += GRAV;
  if (!c.onGround) { c.vx*=(1-AIR_DRAG); c.vy*=(1-AIR_DRAG*0.5); }

  // Rotation
  c.angle = c.onGround ? c.angle*0.6 : c.angle+c.vx*0.013;

  c.x+=c.vx; c.y+=c.vy;

  // Ground clamp
  if (c.y >= GROUND-CAR_H/2) {
    c.y=GROUND-CAR_H/2; c.vy*=-CAR_BNC;
    if(Math.abs(c.vy)<1)c.vy=0;
    c.onGround=true; c.jumpCount=0; c.angle*=0.4;
  } else { c.onGround=false; }

  // Ceiling
  if (c.y<=CEILING+CAR_H/2){ c.y=CEILING+CAR_H/2; c.vy=Math.abs(c.vy)*0.3; }

  // Walls (with goal cutouts)
  if (c.x-CAR_W/2<WALL_L && c.y+CAR_H/2<GL.y){ c.x=WALL_L+CAR_W/2; c.vx=Math.abs(c.vx)*0.5; }
  if (c.x+CAR_W/2>WALL_R && c.y+CAR_H/2<GR.y){ c.x=WALL_R-CAR_W/2; c.vx=-Math.abs(c.vx)*0.5; }
}

// ── Ball step ──────────────────────────────────────────
function stepBall() {
  ball.vy += GRAV*0.87;
  ball.vx *= (1-AIR_DRAG*0.4);
  ball.vy *= (1-AIR_DRAG*0.22);
  ball.x+=ball.vx; ball.y+=ball.vy;
  ball.spin += (ball.vx*0.024 - ball.spin)*0.11;

  if (ball.y+BALL_R>=GROUND){ ball.y=GROUND-BALL_R; ball.vy*=-BALL_BNC; ball.vx*=(1-FRICTION*1.5); if(Math.abs(ball.vy)<0.5)ball.vy=0; }
  if (ball.y-BALL_R<=CEILING){ ball.y=CEILING+BALL_R; ball.vy=Math.abs(ball.vy)*BALL_BNC; }
  if (ball.x-BALL_R<=WALL_L && ball.y<GL.y){ ball.x=WALL_L+BALL_R; ball.vx=Math.abs(ball.vx)*BALL_BNC; }
  if (ball.x+BALL_R>=WALL_R && ball.y<GR.y){ ball.x=WALL_R-BALL_R; ball.vx=-Math.abs(ball.vx)*BALL_BNC; }
}

// ── Collisions ─────────────────────────────────────────
function hitCarBall(c) {
  const rx = c.x - CAR_W/2, ry = c.y - CAR_H/2;
  const {hit, nx, ny} = circleVsRect(ball.x, ball.y, BALL_R, rx, ry, CAR_W, CAR_H);
  if (!hit) return;

  const m = vlen(nx, ny);
  let ux, uy;
  if (m < 0.001) {
    // Ball is exactly inside — push straight up as fallback
    ux = 0; uy = -1;
  } else {
    ux = nx / m; uy = ny / m;
  }

  // Velocity transfer: car speed influences launch power
  const carSpd = vlen(c.vx, c.vy);
  const hitSpd = 8 + carSpd * 0.9;

  ball.vx = ux * hitSpd + c.vx * 0.5;
  ball.vy = uy * hitSpd + c.vy * 0.5;

  // Push ball fully outside the car (from the nearest rect surface point)
  const nearX = clamp(ball.x, rx, rx + CAR_W);
  const nearY = clamp(ball.y, ry, ry + CAR_H);
  ball.x = nearX + ux * (BALL_R + 1);
  ball.y = nearY + uy * (BALL_R + 1);

  // Small rebound on car
  c.vx -= ux * 1.5;
  c.vy -= uy * 1.5;
}

function hitCarCar() {
  const dx=player.x-cpu.x, dy=player.y-cpu.y, d=vlen(dx,dy), min=CAR_W*0.88;
  if(d<min&&d>0.1){
    const ux=dx/d,uy=dy/d,sep=(min-d)/2+1;
    player.x+=ux*sep; player.y+=uy*sep; cpu.x-=ux*sep; cpu.y-=uy*sep;
    const dot=(player.vx-cpu.vx)*ux+(player.vy-cpu.vy)*uy;
    if(dot>0){ player.vx-=dot*ux*.75; player.vy-=dot*uy*.75; cpu.vx+=dot*ux*.75; cpu.vy+=dot*uy*.75; }
  }
}

// ── Boost pads ─────────────────────────────────────────
function checkPads(c){
  PADS.forEach(p=>{
    if(p.cd>0){p.cd--;return;}
    if(vlen(c.x-p.x,c.y-p.y)<p.r+14){ c.boost=Math.min(BOOST_MAX,c.boost+(p.large?100:28)); p.cd=p.large?600:320; }
  });
}

// ── Goals ──────────────────────────────────────────────
function checkGoal(){
  if (goalCD > 0) return;
  // Ball enters RIGHT goal → Blue scores (blue attacks right)
  if (ball.x + BALL_R > GR.x && ball.y + BALL_R > GR.y) {
    scoreBlue++;
    flashGoal('blue');
    return;
  }
  // Ball enters LEFT goal → Orange scores (orange attacks left)
  if (ball.x - BALL_R < GL.x + GL.w && ball.y + BALL_R > GL.y) {
    scoreOrange++;
    flashGoal('orange');
  }
}

function flashGoal(team){
  goalCD=220;
  const col=team==='blue'?'#00b4ff':'#ff6a00';
  const gt=document.getElementById('gtext'), gf=document.getElementById('gflash');
  gt.style.color=col; gt.style.opacity='1'; gt.style.transform='translate(-50%,-50%) scale(1)';
  gf.style.background=team==='blue'?'rgba(0,180,255,0.14)':'rgba(255,106,0,0.14)'; gf.style.opacity='1';
  setTimeout(()=>{ gt.style.opacity='0'; gt.style.transform='translate(-50%,-50%) scale(0.3)'; gf.style.opacity='0';
    document.getElementById('sBlue').textContent=scoreBlue; document.getElementById('sOrange').textContent=scoreOrange; }, 1800);
  setTimeout(()=>{ spawnAll(); goalCD=0; }, 2100);
}

// ── CPU AI ─────────────────────────────────────────────
// CPU is orange: spawns right side, attacks LEFT goal, defends RIGHT goal
function cpuBrain(c){
  const d = vlen(c.x - ball.x, c.y - ball.y);
  const ballInOwnHalf = ball.x > GW * 0.5;   // ball on CPU's side
  const ballInDanger  = ball.x > GW * 0.72;  // ball near CPU's goal

  let drive = 0, jump = false, boost = false;

  if (ballInDanger) {
    // Defend: get between ball and own goal
    const targetX = ball.x + 40; // position slightly to the right of the ball to block
    const dx = targetX - c.x;
    drive = Math.abs(dx) > 15 ? sign(dx) : 0;
    boost = c.boost > 20;
  } else {
    // Attack: get behind the ball and drive it left toward player's goal
    // "Behind" the ball means to the RIGHT of it (so we push it left)
    const targetX = ball.x + 55;
    const dx = targetX - c.x;
    drive = Math.abs(dx) > 20 ? sign(dx) : -1; // default drive left to push ball
    boost = d > 180 && c.boost > 25;
  }

  // Jump if ball is above and nearby
  if (ball.y - c.y < -30 && d < 190) {
    if (c.onGround) jump = true;
    else if (c.jumpCount === 1 && ball.y < c.y - 50) jump = true;
  }

  return { drive, jump, boost };
}

// ── Timer ──────────────────────────────────────────────
function tickTimer(dt){
  if(!running)return;
  timerAcc+=dt;
  if(timerAcc>=1000){
    timerAcc-=1000; timeLeft=Math.max(0,timeLeft-1);
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    if(timeLeft===0)endMatch();
  }
}

function endMatch(){
  running=false;
  const rm=document.getElementById('result-msg');
  rm.style.display='block';
  document.getElementById('intro-p').style.display='none';
  if(scoreBlue>scoreOrange){rm.style.color='#00b4ff';rm.textContent='🏆  BLUE WINS!';}
  else if(scoreOrange>scoreBlue){rm.style.color='#ff6a00';rm.textContent='🏆  ORANGE WINS!';}
  else{rm.style.color='#ffe000';rm.textContent="🤝  IT'S A TIE!";}
  document.getElementById('startBtn').textContent='PLAY AGAIN';
  document.getElementById('overlay').style.display='flex';
}

// ── Renderers ──────────────────────────────────────────
function shadeHex(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  return `rgb(${clamp(((n>>16)&0xff)+amt,0,255)},${clamp(((n>>8)&0xff)+amt,0,255)},${clamp((n&0xff)+amt,0,255)})`;
}
function rrect(x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawArena(){
  // BG
  const sky=ctx.createLinearGradient(0,0,0,GH);
  sky.addColorStop(0,'#07071a');sky.addColorStop(1,'#0e0e24');
  ctx.fillStyle=sky;ctx.fillRect(0,0,GW,GH);
  // Midfield
  ctx.save();ctx.strokeStyle='#1a1a36';ctx.lineWidth=1.5;ctx.setLineDash([8,13]);
  ctx.beginPath();ctx.moveTo(GW/2,CEILING);ctx.lineTo(GW/2,GROUND);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(GW/2,(GROUND+CEILING)/2,68,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  // Ground
  const gnd=ctx.createLinearGradient(0,GROUND,0,GROUND+55);
  gnd.addColorStop(0,'#1b1c50');gnd.addColorStop(1,'#09091a');
  ctx.fillStyle=gnd;ctx.fillRect(0,GROUND,GW,GH-GROUND);
  ctx.strokeStyle='#32327a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(WALL_L,GROUND);ctx.lineTo(WALL_R,GROUND);ctx.stroke();
  // Side walls
  ctx.fillStyle='#0b0b1e';
  ctx.fillRect(0,CEILING,WALL_L,GROUND-CEILING);
  ctx.fillRect(WALL_R,CEILING,GW-WALL_R,GROUND-CEILING);
  ctx.strokeStyle='#252550';ctx.lineWidth=2;
  ctx.strokeRect(WALL_L,CEILING,WALL_R-WALL_L,GROUND-CEILING);
  // Ceiling bar
  ctx.fillStyle='#0b0b1e';ctx.fillRect(0,0,GW,CEILING);
  ctx.strokeStyle='#252550';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(WALL_L,CEILING);ctx.lineTo(WALL_R,CEILING);ctx.stroke();
  // Goals
  [{g:GL,fill:'rgba(255,106,0,0.08)',stroke:'#ff6a00',label:'ORANGE'},
   {g:GR,fill:'rgba(0,180,255,0.08)', stroke:'#00b4ff',label:'BLUE'}].forEach(({g,fill,stroke,label})=>{
    ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=2;
    ctx.fillRect(g.x,g.y,g.w,g.h);ctx.strokeRect(g.x,g.y,g.w,g.h);
    ctx.fillStyle=stroke;ctx.globalAlpha=0.45;
    ctx.font='bold 10px "Exo 2",Arial';ctx.textAlign='center';
    ctx.fillText(label,g.x+g.w/2,g.y+16);ctx.globalAlpha=1;
  });
}

function drawPads(){
  PADS.forEach(p=>{
    ctx.globalAlpha=p.cd>0?0.2:0.9;
    const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    gr.addColorStop(0,'#ffe000');gr.addColorStop(0.55,'rgba(255,175,0,0.55)');gr.addColorStop(1,'rgba(255,130,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawCar(c){
  ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle);
  // Shadow
  ctx.save();ctx.rotate(-c.angle);ctx.globalAlpha=0.25;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,CAR_H/2+2,CAR_W/2,5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
  // Body
  const bg=ctx.createLinearGradient(-CAR_W/2,-CAR_H/2,CAR_W/2,CAR_H/2);
  bg.addColorStop(0,c.color);bg.addColorStop(1,shadeHex(c.color,-50));
  ctx.fillStyle=bg;ctx.beginPath();rrect(-CAR_W/2,-CAR_H/2,CAR_W,CAR_H,7);ctx.fill();
  ctx.strokeStyle=c.color+'88';ctx.lineWidth=1.5;ctx.beginPath();rrect(-CAR_W/2,-CAR_H/2,CAR_W,CAR_H,7);ctx.stroke();
  // Windshield
  const d=c.dir;ctx.fillStyle='rgba(150,225,255,0.2)';ctx.beginPath();
  ctx.moveTo(d*4,-CAR_H/2+2);ctx.lineTo(d*(CAR_W/2-4),-CAR_H/2+2);
  ctx.lineTo(d*(CAR_W/2-2),-CAR_H/2+CAR_H*0.46);ctx.lineTo(d*4,-CAR_H/2+CAR_H*0.46);
  ctx.closePath();ctx.fill();
  // Headlight
  ctx.shadowColor='#fffbe0';ctx.shadowBlur=10;ctx.fillStyle='#fffbe0';
  ctx.fillRect(d*(CAR_W/2-8),-CAR_H/2+5,d*5,4);ctx.shadowBlur=0;
  // Wheels
  [[-CAR_W/2+9,CAR_H/2-1],[CAR_W/2-9,CAR_H/2-1]].forEach(([wx,wy])=>{
    ctx.fillStyle='#1a1a3a';ctx.beginPath();ctx.arc(wx,wy,8.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#35355a';ctx.beginPath();ctx.arc(wx,wy,5.5,0,Math.PI*2);ctx.fill();
  });
  // Boost flame
  if(!c.onGround&&c.boost<BOOST_MAX){
    ctx.save();ctx.translate(-d*CAR_W/2,0);
    const fl=16+Math.random()*10;
    const fg=ctx.createLinearGradient(0,0,-d*fl,0);
    fg.addColorStop(0,'#ffe000');fg.addColorStop(0.5,'#ff4400');fg.addColorStop(1,'rgba(255,30,0,0)');
    ctx.fillStyle=fg;ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(-d*fl,0);ctx.lineTo(0,5);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawBall(){
  ctx.save();ctx.translate(ball.x,ball.y);
  const sh=GROUND-ball.y;
  if(sh>0){
    const a=Math.max(0,1-sh/280)*0.30;
    ctx.save();ctx.translate(0,sh-BALL_R+7);ctx.scale(1+sh/380,0.26);
    ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.beginPath();ctx.arc(0,0,BALL_R*0.8,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  ctx.shadowColor='#aac8ff';ctx.shadowBlur=14;
  const bg=ctx.createRadialGradient(-BALL_R*.24,-BALL_R*.24,BALL_R*.05,0,0,BALL_R);
  bg.addColorStop(0,'#dce8ff');bg.addColorStop(0.42,'#98aadc');bg.addColorStop(1,'#334');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,BALL_R,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.rotate(ball.spin);ctx.strokeStyle='rgba(0,0,40,0.32)';ctx.lineWidth=1.4;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,0,BALL_R,i*Math.PI*2/3,i*Math.PI*2/3+Math.PI);ctx.stroke();}
  ctx.restore();
}

function updateHUD(){
  document.getElementById('boost-fill').style.width=(player.boost/BOOST_MAX*100)+'%';
}

// ── Game loop ──────────────────────────────────────────
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  if(running&&goalCD===0){
    stepCar(player);stepCar(cpu);stepBall();
    hitCarBall(player);hitCarBall(cpu);hitCarCar();
    checkPads(player);checkPads(cpu);checkGoal();tickTimer(dt);
  }else if(goalCD>0)goalCD--;
  ctx.clearRect(0,0,GW,GH);
  drawArena();drawPads();
  if(running||goalCD>0){ drawCar(player);drawCar(cpu);drawBall(); }
  if(running)updateHUD();
  requestAnimationFrame(loop);
}

// ── Start ──────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click',()=>{
  scoreBlue=0;scoreOrange=0;timeLeft=MATCH_TIME;timerAcc=0;
  document.getElementById('sBlue').textContent='0';
  document.getElementById('sOrange').textContent='0';
  document.getElementById('timer').textContent='5:00';
  document.getElementById('result-msg').style.display='none';
  document.getElementById('intro-p').style.display='block';
  document.getElementById('overlay').style.display='none';
  PADS.forEach(p=>p.cd=0);
  spawnAll();
  running=true;
});

requestAnimationFrame(ts=>{lastT=ts;spawnAll();requestAnimationFrame(loop);});
</script>
