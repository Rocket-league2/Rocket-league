<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket League 2D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #00b4ff;
    --orange: #ff6a00;
    --bg: #0a0a12;
    --panel: #10101e;
    --accent: #ffe000;
    --white: #f0f4ff;
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Exo 2', sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  #ui-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 900px;
  }

  /* ── Scoreboard ── */
  #scoreboard {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: var(--panel);
    border: 1px solid #1e1e36;
    border-radius: 8px;
    padding: 8px 24px;
    box-shadow: 0 0 30px #00b4ff22;
  }

  .team-score {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
  }
  .team-score.blue { color: var(--blue); }
  .team-score.orange { color: var(--orange); }

  .team-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    opacity: 0.7;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
  }

  #timer {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
  }

  /* ── Canvas ── */
  #gameCanvas {
    display: block;
    border-radius: 6px;
    border: 2px solid #1e1e36;
    box-shadow: 0 0 60px #00b4ff18, 0 0 120px #00b4ff08;
    cursor: none;
  }

  /* ── Boost bar ── */
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 4px 8px;
  }

  .boost-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 200px;
  }
  .boost-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    opacity: 0.6;
    font-weight: 700;
  }
  .boost-bar-bg {
    height: 10px;
    background: #1a1a2e;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #2a2a4a;
  }
  #boost-bar {
    height: 100%;
    background: linear-gradient(90deg, #ffe000, #ff8800);
    border-radius: 5px;
    width: 100%;
    transition: width 0.05s;
    box-shadow: 0 0 8px #ffe00088;
  }

  .controls-hint {
    font-size: 0.65rem;
    color: #4a4a7a;
    text-align: right;
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .key {
    display: inline-block;
    background: #1a1a2e;
    border: 1px solid #3a3a6a;
    border-radius: 3px;
    padding: 0 5px;
    color: var(--white);
    font-size: 0.6rem;
  }

  /* ── Overlay ── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,5,15,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(4px);
    z-index: 100;
  }
  #overlay h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 4rem;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--blue), var(--accent), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }
  #overlay p {
    font-size: 1rem;
    opacity: 0.6;
    letter-spacing: 2px;
    max-width: 440px;
    text-align: center;
    line-height: 1.7;
  }
  #overlay .result-line {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 4px;
  }
  .btn {
    margin-top: 10px;
    padding: 14px 48px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 4px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    background: var(--accent);
    color: #0a0a12;
    box-shadow: 0 0 30px #ffe00066;
  }

  #goal-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.1s;
  }

  #goal-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0.5);
    font-family: 'Rajdhani', sans-serif;
    font-size: 5rem;
    font-weight: 700;
    letter-spacing: 8px;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    text-shadow: 0 0 40px currentColor;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>ROCKET LEAGUE 2D</h1>
  <p id="overlay-msg">Score goals by hitting the ball into the opponent's net. Use boost to go faster and fly!</p>
  <div id="result-line" class="result-line" style="display:none"></div>
  <button class="btn" id="start-btn">KICK OFF</button>
</div>

<div id="goal-flash"></div>
<div id="goal-text">GOAL!</div>

<div id="ui-wrapper">
  <div id="scoreboard">
    <div class="team-score blue">
      <div>
        <div class="team-label">BLUE</div>
        <div id="score-blue">0</div>
      </div>
    </div>
    <div id="timer">5:00</div>
    <div class="team-score orange">
      <div style="text-align:right">
        <div class="team-label">ORANGE</div>
        <div id="score-orange">0</div>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas" width="900" height="520"></canvas>

  <div id="hud">
    <div class="boost-wrap">
      <div class="boost-label">⚡ BOOST</div>
      <div class="boost-bar-bg"><div id="boost-bar"></div></div>
    </div>
    <div class="controls-hint">
      <span class="key">W</span><span class="key">A</span><span class="key">D</span> Drive &nbsp;
      <span class="key">Space</span> Jump &nbsp;
      <span class="key">Shift</span> Boost<br>
      Double-tap <span class="key">Space</span> = Air roll &nbsp;|&nbsp;
      <span class="key">R</span> Respawn
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  ROCKET LEAGUE 2D  —  Full game engine
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Constants ─────────────────────────────────
const GRAVITY   = 0.55;
const FRICTION  = 0.015;       // rolling ground friction
const AIR_DRAG  = 0.003;
const BALL_R    = 28;
const CAR_W     = 52, CAR_H = 30;
const BOOST_MAX = 100;
const BOOST_DRAIN = 0.6;
const BOOST_REGEN = 0.12;
const BOOST_FORCE = 0.92;
const DRIVE_FORCE = 0.55;
const JUMP_VY   = -14;
const MAX_SPEED = 14;
const BALL_BOUNCE = 0.62;
const CAR_BOUNCE  = 0.45;
const MATCH_SEC = 300;

// ── Arena geometry ────────────────────────────
const GROUND  = H - 60;
const CEILING = 60;
const WALL_L  = 30;
const WALL_R  = W - 30;
const GOAL_W  = 110;
const GOAL_H  = 130;
const GOAL_L  = { x: WALL_L, y: GROUND - GOAL_H, w: GOAL_W, h: GOAL_H };
const GOAL_R  = { x: WALL_R - GOAL_W, y: GROUND - GOAL_H, w: GOAL_W, h: GOAL_H };

// Boost pads (small orange circles on ground)
const BOOST_PADS = [
  { x: W/2, y: GROUND - 8, r: 18, large: true,  cooldown: 0 },
  { x: 180,  y: GROUND - 8, r: 14, large: false, cooldown: 0 },
  { x: W-180,y: GROUND - 8, r: 14, large: false, cooldown: 0 },
  { x: W/2,  y: H*0.45,     r: 14, large: false, cooldown: 0 },
];

// ── State ─────────────────────────────────────
let scoreBlue = 0, scoreOrange = 0;
let timeLeft  = MATCH_SEC;
let gameRunning = false;
let lastTime = 0;
let keys = {};
let goalCooldown = 0;
let goalFlashTimer = 0;

// ── Ball ──────────────────────────────────────
let ball;
function resetBall() {
  ball = { x: W/2, y: GROUND - BALL_R - 10, vx: (Math.random()-0.5)*4, vy: -2, spin: 0 };
}

// ── Car factory ───────────────────────────────
function makeCar(x, dir, isPlayer, color) {
  return {
    x, y: GROUND - CAR_H/2,
    vx: 0, vy: 0,
    angle: 0,           // rotation in air
    onGround: true,
    jumped: false,       // used for double-jump
    jumpCount: 0,
    boost: BOOST_MAX,
    dir,                 // 1 = right, -1 = left
    isPlayer,
    color,
    w: CAR_W, h: CAR_H,
    dodgeCooldown: 0,
    jumpHeld: false,
    dead: false,
  };
}

let player, cpu;
function resetCars() {
  player = makeCar(W/4,   1, true,  '#00b4ff');
  cpu    = makeCar(3*W/4,-1, false, '#ff6a00');
}

// ── Input ─────────────────────────────────────
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Helpers ───────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const sign   = v => v === 0 ? 0 : v > 0 ? 1 : -1;

function carRect(c) {
  return { x: c.x - c.w/2, y: c.y - c.h/2, w: c.w, h: c.h };
}

function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const nearX = clamp(cx, rx, rx+rw);
  const nearY = clamp(cy, ry, ry+rh);
  const dx = cx - nearX, dy = cy - nearY;
  return { hit: dx*dx+dy*dy < r*r, nx: dx, ny: dy, nearX, nearY };
}

// ── Physics step ─────────────────────────────
function stepCar(c, dt) {
  if (c.dead) return;

  // ── Inputs / AI ──
  let drive = 0, wantJump = false, wantBoost = false;

  if (c.isPlayer) {
    if (keys['KeyA'] || keys['ArrowLeft'])  drive = -1;
    if (keys['KeyD'] || keys['ArrowRight']) drive =  1;
    wantJump  = keys['Space'];
    wantBoost = keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyW'] || keys['ArrowUp'];
  } else {
    const ai = cpuAI(c);
    drive = ai.drive; wantJump = ai.jump; wantBoost = ai.boost;
  }

  // ── Drive ──
  const speed = Math.abs(c.vx);
  if (c.onGround) {
    c.vx += drive * DRIVE_FORCE;
    c.vx *= (1 - FRICTION);
  } else {
    c.vx += drive * DRIVE_FORCE * 0.4;
  }
  c.vx = clamp(c.vx, -MAX_SPEED, MAX_SPEED);

  // ── Boost ──
  if (wantBoost && c.boost > 0) {
    const bdir = (drive !== 0) ? sign(c.vx || drive) : (c.dir);
    c.vx += bdir * BOOST_FORCE;
    c.vx = clamp(c.vx, -MAX_SPEED * 1.6, MAX_SPEED * 1.6);
    if (!c.onGround) c.vy -= BOOST_FORCE * 0.5;
    c.boost = Math.max(0, c.boost - BOOST_DRAIN);
  } else {
    c.boost = Math.min(BOOST_MAX, c.boost + BOOST_REGEN * 0.3);
  }

  if (drive !== 0) c.dir = drive;

  // ── Jump ──
  if (wantJump && !c.jumpHeld) {
    if (c.onGround) {
      c.vy = JUMP_VY; c.onGround = false; c.jumpCount = 1;
    } else if (c.jumpCount === 1) {
      c.vy = JUMP_VY * 0.85;
      c.vx += c.dir * 5;
      c.jumpCount = 2;
    }
    c.jumpHeld = true;
  }
  if (!wantJump) c.jumpHeld = false;

  // ── Gravity & drag ──
  c.vy += GRAVITY;
  if (!c.onGround) {
    c.vx *= (1 - AIR_DRAG);
    c.vy *= (1 - AIR_DRAG * 0.5);
  }

  // ── Rotation in air ──
  if (!c.onGround) {
    c.angle += c.vx * 0.012;
  } else {
    c.angle *= 0.7;
  }

  // ── Move ──
  c.x += c.vx;
  c.y += c.vy;

  // ── Ground collision ──
  const groundY = GROUND - c.h/2;
  if (c.y >= groundY) {
    c.y = groundY;
    c.vy *= -CAR_BOUNCE;
    if (Math.abs(c.vy) < 1) { c.vy = 0; }
    c.onGround = true;
    c.jumpCount = 0;
    c.angle *= 0.5;
  } else {
    c.onGround = false;
  }

  // ── Ceiling ──
  if (c.y <= CEILING + c.h/2) {
    c.y = CEILING + c.h/2;
    c.vy = Math.abs(c.vy) * 0.3;
  }

  // ── Walls (excluding goal openings) ──
  const ly = c.y + c.h/2;
  if (c.x - c.w/2 < WALL_L) {
    const inGoal = (ly > GOAL_L.y);
    if (!inGoal) { c.x = WALL_L + c.w/2; c.vx = Math.abs(c.vx) * 0.5; }
    else { c.x = Math.max(c.x, WALL_L + c.w/2); }
  }
  if (c.x + c.w/2 > WALL_R) {
    const inGoal = (ly > GOAL_R.y);
    if (!inGoal) { c.x = WALL_R - c.w/2; c.vx = -Math.abs(c.vx) * 0.5; }
    else { c.x = Math.min(c.x, WALL_R - c.w/2); }
  }
}

function stepBall(dt) {
  ball.vy += GRAVITY * 0.9;
  ball.vx *= (1 - AIR_DRAG * 0.5);
  ball.vy *= (1 - AIR_DRAG * 0.3);
  ball.x  += ball.vx;
  ball.y  += ball.vy;
  ball.spin += (ball.vx * 0.02 - ball.spin) * 0.1;

  // ── Ground ──
  if (ball.y + BALL_R >= GROUND) {
    ball.y = GROUND - BALL_R;
    ball.vy *= -BALL_BOUNCE;
    ball.vx *= (1 - FRICTION * 1.5);
    if (Math.abs(ball.vy) < 0.5) ball.vy = 0;
  }
  // ── Ceiling ──
  if (ball.y - BALL_R <= CEILING) {
    ball.y = CEILING + BALL_R;
    ball.vy = Math.abs(ball.vy) * BALL_BOUNCE;
  }
  // ── Walls ──
  if (ball.x - BALL_R <= WALL_L) {
    ball.x = WALL_L + BALL_R;
    ball.vx = Math.abs(ball.vx) * BALL_BOUNCE;
  }
  if (ball.x + BALL_R >= WALL_R) {
    ball.x = WALL_R - BALL_R;
    ball.vx = -Math.abs(ball.vx) * BALL_BOUNCE;
  }
}

// ── Car-Ball collision ────────────────────────
function carBallCollision(c) {
  if (c.dead) return;
  const r = carRect(c);
  const { hit, nx, ny } = circleRect(ball.x, ball.y, BALL_R, r.x, r.y, r.w, r.h);
  if (!hit) return;

  const len = Math.hypot(nx, ny) || 1;
  const ux = nx/len, uy = ny/len;
  const speed = 10 + Math.hypot(c.vx, c.vy) * 0.8;

  ball.vx = ux * speed * 0.9 + c.vx * 0.5;
  ball.vy = uy * speed * 0.9 + c.vy * 0.5;

  // push ball out
  ball.x = c.x + ux * (BALL_R + c.w/2 + 2);
  ball.y = c.y + uy * (BALL_R + c.h/2 + 2);

  c.vx -= ux * 2;
  c.vy -= uy * 2;
}

// ── Car-Car collision ─────────────────────────
function carCarCollision() {
  const dx = player.x - cpu.x, dy = player.y - cpu.y;
  const d  = Math.hypot(dx, dy);
  const minD = (CAR_W + CAR_H) / 2;
  if (d < minD) {
    const ux = dx/d || 1, uy = dy/d || 0;
    const sep = (minD - d) / 2 + 1;
    player.x += ux * sep; player.y += uy * sep;
    cpu.x    -= ux * sep; cpu.y    -= uy * sep;
    const relVx = player.vx - cpu.vx;
    const relVy = player.vy - cpu.vy;
    const dot   = relVx*ux + relVy*uy;
    if (dot > 0) {
      player.vx -= dot*ux*0.8; player.vy -= dot*uy*0.8;
      cpu.vx    += dot*ux*0.8; cpu.vy    += dot*uy*0.8;
    }
  }
}

// ── Boost pad pickup ──────────────────────────
function checkBoostPads(c) {
  BOOST_PADS.forEach(p => {
    if (p.cooldown > 0) return;
    if (dist(c, p) < p.r + 16) {
      const gain = p.large ? 100 : 25;
      c.boost = Math.min(BOOST_MAX, c.boost + gain);
      p.cooldown = p.large ? 600 : 300;
    }
  });
}

// ── Goal detection ────────────────────────────
function checkGoal() {
  if (goalCooldown > 0) return;
  // Blue scores in right goal
  if (ball.x + BALL_R > GOAL_R.x && ball.y > GOAL_R.y) {
    scoreBlue++;
    triggerGoal('blue');
    return;
  }
  // Orange scores in left goal
  if (ball.x - BALL_R < GOAL_L.x + GOAL_L.w && ball.y > GOAL_L.y) {
    scoreOrange++;
    triggerGoal('orange');
    return;
  }
}

function triggerGoal(team) {
  goalCooldown = 200;
  goalFlashTimer = 50;
  const gt = document.getElementById('goal-text');
  gt.style.color = team === 'blue' ? '#00b4ff' : '#ff6a00';
  gt.style.opacity = '1';
  gt.style.transform = 'translate(-50%,-50%) scale(1)';
  const flash = document.getElementById('goal-flash');
  flash.style.background = team === 'blue' ? 'rgba(0,180,255,0.18)' : 'rgba(255,106,0,0.18)';
  flash.style.opacity = '1';
  setTimeout(() => {
    gt.style.opacity = '0';
    gt.style.transform = 'translate(-50%,-50%) scale(0.5)';
    flash.style.opacity = '0';
    document.getElementById('score-blue').textContent   = scoreBlue;
    document.getElementById('score-orange').textContent = scoreOrange;
  }, 1800);
  setTimeout(() => {
    resetBall();
    resetCars();
    goalCooldown = 0;
  }, 2000);
}

// ── CPU AI ────────────────────────────────────
let cpuJumpTimer = 0, cpuBoostMode = false;
function cpuAI(c) {
  const bx = ball.x, by = ball.y;
  const targetX = bx - 40; // aim slightly behind ball toward left goal
  const dx = targetX - c.x;
  const dyBall = by - c.y;

  let drive = 0, jump = false, boost = false;

  // Drive toward ball horizontally
  if (Math.abs(dx) > 20) drive = dx > 0 ? 1 : -1;

  // Decide on boost
  const distToBall = dist(c, ball);
  if (distToBall > 200 && c.boost > 30) boost = true;
  if (ball.vy < -5 && by < GROUND - 100) boost = true; // ball going up

  // Jump if ball is above car and car is close enough
  if (dyBall < -30 && distToBall < 180) {
    if (c.onGround) { jump = true; }
    else if (c.jumpCount === 1 && by < c.y - 60) jump = true;
  }

  // Occasionally retreat if ball is on own side
  if (bx < W/3 && c.x < W/3) {
    drive = -1; // back off
  }

  return { drive, jump, boost };
}

// ── Timer ─────────────────────────────────────
let timerAccum = 0;
function updateTimer(dt) {
  if (!gameRunning) return;
  timerAccum += dt;
  if (timerAccum >= 1000) {
    timerAccum -= 1000;
    timeLeft = Math.max(0, timeLeft - 1);
    const m = Math.floor(timeLeft/60);
    const s = timeLeft % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (timeLeft === 0) endGame();
  }
}

function endGame() {
  gameRunning = false;
  const overlay = document.getElementById('overlay');
  const rl = document.getElementById('result-line');
  const msg = document.getElementById('overlay-msg');
  rl.style.display = 'block';
  msg.style.display = 'none';
  if (scoreBlue > scoreOrange) {
    rl.style.color = '#00b4ff';
    rl.textContent = '🏆 BLUE WINS!';
  } else if (scoreOrange > scoreBlue) {
    rl.style.color = '#ff6a00';
    rl.textContent = '🏆 ORANGE WINS!';
  } else {
    rl.style.color = '#ffe000';
    rl.textContent = "IT'S A TIE!";
  }
  document.getElementById('start-btn').textContent = 'PLAY AGAIN';
  overlay.style.display = 'flex';
}

// ── Drawing ───────────────────────────────────
function drawArena() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, '#0a0a1f');
  sky.addColorStop(1, '#111128');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Field lines
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 1;
  ctx.setLineDash([8,12]);
  ctx.beginPath(); ctx.moveTo(W/2, CEILING); ctx.lineTo(W/2, GROUND); ctx.stroke();
  ctx.setLineDash([]);

  // Centre circle
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(W/2, (GROUND+CEILING)/2, 70, 0, Math.PI*2); ctx.stroke();

  // Ground
  const gnd = ctx.createLinearGradient(0, GROUND-4, 0, GROUND+30);
  gnd.addColorStop(0, '#1e2050');
  gnd.addColorStop(1, '#0a0a12');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // Ground line
  ctx.strokeStyle = '#3a3a7a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(WALL_L, GROUND); ctx.lineTo(WALL_R, GROUND); ctx.stroke();

  // Walls
  ctx.fillStyle = '#12122a';
  ctx.fillRect(0, CEILING, WALL_L, GROUND - CEILING);
  ctx.fillRect(WALL_R, CEILING, W - WALL_R, GROUND - CEILING);
  ctx.strokeStyle = '#2a2a5a';
  ctx.lineWidth = 2;
  ctx.strokeRect(WALL_L, CEILING, WALL_R - WALL_L, GROUND - CEILING);

  // Ceiling
  ctx.fillStyle = '#10101e';
  ctx.fillRect(0, 0, W, CEILING);
  ctx.strokeStyle = '#2a2a5a';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(WALL_L, CEILING); ctx.lineTo(WALL_R, CEILING); ctx.stroke();

  // Left goal (Orange shoots into this)
  ctx.fillStyle = 'rgba(255,106,0,0.08)';
  ctx.fillRect(GOAL_L.x, GOAL_L.y, GOAL_L.w, GOAL_L.h);
  ctx.strokeStyle = '#ff6a00';
  ctx.lineWidth = 2;
  ctx.strokeRect(GOAL_L.x, GOAL_L.y, GOAL_L.w, GOAL_L.h);

  // Right goal (Blue shoots into this)
  ctx.fillStyle = 'rgba(0,180,255,0.08)';
  ctx.fillRect(GOAL_R.x, GOAL_R.y, GOAL_R.w, GOAL_R.h);
  ctx.strokeStyle = '#00b4ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(GOAL_R.x, GOAL_R.y, GOAL_R.w, GOAL_R.h);

  // Goal labels
  ctx.fillStyle = 'rgba(255,106,0,0.5)';
  ctx.font = 'bold 10px Exo 2';
  ctx.textAlign = 'center';
  ctx.fillText('ORANGE', GOAL_L.x + GOAL_L.w/2, GOAL_L.y + 18);
  ctx.fillStyle = 'rgba(0,180,255,0.5)';
  ctx.fillText('BLUE', GOAL_R.x + GOAL_R.w/2, GOAL_R.y + 18);
}

function drawBoostPads() {
  BOOST_PADS.forEach(p => {
    if (p.cooldown > 0) {
      p.cooldown--;
      ctx.globalAlpha = 0.2;
    }
    const r = p.large ? p.r : p.r * 0.9;
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grad.addColorStop(0, '#ffe000');
    grad.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawCar(c) {
  if (c.dead) return;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.angle);

  // Shadow
  ctx.save();
  ctx.rotate(-c.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, c.h/2 + 2, c.w/2, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Body
  const grad = ctx.createLinearGradient(-c.w/2, -c.h/2, c.w/2, c.h/2);
  grad.addColorStop(0, c.color);
  grad.addColorStop(1, shadeColor(c.color, -40));
  ctx.fillStyle = grad;
  ctx.beginPath();
  roundRect(ctx, -c.w/2, -c.h/2, c.w, c.h, 7);
  ctx.fill();

  // Cockpit / windshield
  ctx.fillStyle = 'rgba(150,220,255,0.25)';
  const wDir = c.dir;
  ctx.beginPath();
  ctx.moveTo(wDir*4, -c.h/2 + 2);
  ctx.lineTo(wDir*(c.w/2 - 4), -c.h/2 + 2);
  ctx.lineTo(wDir*(c.w/2 - 2), -c.h/2 + c.h*0.45);
  ctx.lineTo(wDir*4, -c.h/2 + c.h*0.45);
  ctx.closePath();
  ctx.fill();

  // Headlights
  ctx.fillStyle = c.color === '#00b4ff' ? '#fffbe0' : '#fffbe0';
  ctx.shadowColor = c.color;
  ctx.shadowBlur = 12;
  const hx = wDir * (c.w/2 - 4);
  ctx.fillRect(hx - wDir*3, -c.h/2 + 6, 5*wDir, 4);
  ctx.shadowBlur = 0;

  // Wheels
  const wheelR = 9;
  [[-c.w/2+8, c.h/2 - 2],[c.w/2-8, c.h/2 - 2]].forEach(([wx,wy]) => {
    ctx.fillStyle = '#222244';
    ctx.beginPath(); ctx.arc(wx, wy, wheelR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#444466';
    ctx.beginPath(); ctx.arc(wx, wy, wheelR - 3, 0, Math.PI*2); ctx.fill();
  });

  // Boost flame
  if (c.boost < BOOST_MAX && !c.onGround) {
    ctx.save();
    ctx.translate(-wDir * c.w/2, 0);
    const flameLen = 20 + Math.random() * 10;
    const fg = ctx.createLinearGradient(0, 0, -wDir * flameLen, 0);
    fg.addColorStop(0, '#ffe000');
    fg.addColorStop(0.5,'#ff6600');
    fg.addColorStop(1, 'rgba(255,50,0,0)');
    ctx.fillStyle = fg;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.lineTo(-wDir * flameLen, 0);
    ctx.lineTo(0, 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function drawBall() {
  ctx.save();
  ctx.translate(ball.x, ball.y);

  // Shadow
  const shadowY = GROUND - ball.y;
  if (shadowY > 0) {
    const shadowAlpha = Math.max(0, 1 - shadowY / 300) * 0.35;
    ctx.save();
    ctx.translate(0, shadowY - BALL_R + 8);
    ctx.scale(1 + shadowY/400, 0.3);
    ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
    ctx.beginPath(); ctx.arc(0, 0, BALL_R * 0.8, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Glow
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 18;

  // Ball body
  const bg = ctx.createRadialGradient(-6,-6,2, 0,0,BALL_R);
  bg.addColorStop(0, '#e0e8ff');
  bg.addColorStop(0.4,'#aab8e8');
  bg.addColorStop(1, '#445');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Seam lines (rotate with spin)
  ctx.rotate(ball.spin);
  ctx.strokeStyle = 'rgba(0,0,40,0.4)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(0, 0, BALL_R, (i * Math.PI * 2 / 3), (i * Math.PI * 2 / 3) + Math.PI);
    ctx.stroke();
  }

  ctx.restore();
}

function shadeColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = clamp(((num >> 16) & 0xff) + amount, 0, 255);
  const g = clamp(((num >> 8)  & 0xff) + amount, 0, 255);
  const b = clamp(((num)       & 0xff) + amount, 0, 255);
  return `rgb(${r},${g},${b})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawHUD() {
  const pct = player.boost / BOOST_MAX;
  document.getElementById('boost-bar').style.width = (pct * 100) + '%';
}

// ── Main loop ─────────────────────────────────
function gameLoop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  if (gameRunning && goalCooldown === 0) {
    stepCar(player, dt);
    stepCar(cpu, dt);
    stepBall(dt);
    carBallCollision(player);
    carBallCollision(cpu);
    carCarCollision();
    checkBoostPads(player);
    checkBoostPads(cpu);
    checkGoal();
    updateTimer(dt);
  } else if (goalCooldown > 0) {
    goalCooldown--;
  }

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawArena();
  drawBoostPads();
  drawCar(player);
  drawCar(cpu);
  drawBall();
  drawHUD();

  requestAnimationFrame(gameLoop);
}

// ── Start ─────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  scoreBlue = 0; scoreOrange = 0;
  timeLeft = MATCH_SEC;
  document.getElementById('score-blue').textContent   = '0';
  document.getElementById('score-orange').textContent = '0';
  document.getElementById('timer').textContent = '5:00';
  document.getElementById('result-line').style.display = 'none';
  document.getElementById('overlay-msg').style.display = 'block';
  document.getElementById('overlay').style.display = 'none';
  resetBall();
  resetCars();
  BOOST_PADS.forEach(p => p.cooldown = 0);
  gameRunning = true;
});

// Respawn (R key)
window.addEventListener('keydown', e => {
  if (e.code === 'KeyR' && gameRunning) {
    resetCars();
    resetBall();
  }
});

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
